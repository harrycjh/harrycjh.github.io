<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎭 狼人杀 - 联机版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f1a3e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 标题 */
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        .header h1 {
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,200,0,0.5);
            margin-bottom: 5px;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        
        /* 容器 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }
        
        /* 登录区域 */
        .login-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
        }
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a0a2e;
            font-weight: bold;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,200,0,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 连接状态 */
        .status-bar {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .status-bar.connected {
            color: #4ade80;
        }
        .status-bar.disconnected {
            color: #f87171;
        }
        
        /* 游戏信息 */
        .game-info {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .game-info .day-counter {
            font-size: 1.5rem;
            text-align: center;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .game-info .phase {
            text-align: center;
            font-size: 1.1rem;
            padding: 10px;
            background: rgba(255,200,0,0.1);
            border-radius: 8px;
            color: #ffd700;
        }
        
        /* 消息区域 */
        .message-box {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message-box .main-msg {
            font-size: 1.3rem;
            color: #ffd700;
        }
        .message-box .sub-msg {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        
        /* 玩家列表 */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }
        .player-card.dead {
            opacity: 0.4;
        }
        .player-card.dead::after {
            content: '💀';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 0.8rem;
        }
        .player-card.self {
            border: 2px solid #ffd700;
        }
        .player-card.wolf {
            background: rgba(220,38,38,0.3);
        }
        .player-card.voting-target {
            background: rgba(255,200,0,0.4);
            transform: scale(1.05);
        }
        .player-card .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .player-card .name {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-card .role {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin-top: 3px;
        }
        .player-card .vote-count {
            position: absolute;
            top: 5px;
            left: 5px;
            background: #f87171;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 操作区 */
        .action-area {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
        }
        .action-area h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #ffd700;
        }
        .targets-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .target-btn {
            padding: 15px 10px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .target-btn:hover {
            border-color: #ffd700;
            background: rgba(255,200,0,0.2);
        }
        .target-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .action-tip {
            text-align: center;
            padding: 15px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
        
        /* 角色面板 */
        .role-panel {
            background: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(50,50,100,0.5));
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid rgba(255,200,0,0.3);
        }
        .role-panel h3 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .role-panel .role-name {
            text-align: center;
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .role-panel .role-desc {
            text-align: center;
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        .role-panel .skills {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .role-panel .skill {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .role-panel .skill-icon {
            font-size: 1.5rem;
            margin-right: 10px;
        }
        .role-panel .skill-name {
            font-weight: bold;
        }
        .role-panel .skill-desc {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }
        
        /* 等待区 */
        .waiting-area {
            text-align: center;
            padding: 30px;
        }
        .waiting-area .spin {
            font-size: 3rem;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .player-list-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .player-preview {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-preview .num {
            background: #ffd700;
            color: #1a0a2e;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* 结果页面 */
        .result-panel {
            text-align: center;
            padding: 30px;
        }
        .result-panel .winner {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .result-panel .role-reveal {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .role-reveal-item {
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .role-reveal-item .name {
            font-weight: bold;
        }
        .role-reveal-item .role {
            color: #ffd700;
        }
        
        /* 音效按钮 */
        .sfx-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
        }
        
        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        
        /* 按钮动画 */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .pulse {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- 音效开关 -->
    <button class="sfx-toggle" onclick="toggleSfx()" id="sfxBtn">🔊</button>
    
    <div class="header">
        <h1>🎭 狼人杀</h1>
        <div class="subtitle" id="connStatus">正在连接...</div>
    </div>
    
    <div class="container">
        <!-- 登录/创建房间 -->
        <div id="loginSection">
            <div class="login-box">
                <h2>加入游戏</h2>
                <div class="input-group">
                    <label>你的名字</label>
                    <input type="text" id="playerName" placeholder="输入昵称" maxlength="10">
                </div>
                <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
            </div>
            
            <div class="login-box">
                <h2>加入房间</h2>
                <div class="input-group">
                    <label>房间号</label>
                    <input type="text" id="roomCode" placeholder="输入6位房间号">
                </div>
                <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
            </div>
        </div>
        
        <!-- 等待房间 -->
        <div id="waitingSection" class="hidden">
            <div class="game-info fade-in">
                <div class="day-counter">房间号: <span id="displayRoomCode">------</span></div>
                <div class="phase">等待玩家加入...</div>
            </div>
            
            <div class="waiting-area">
                <div class="spin">🎭</div>
                <p>等待其他玩家加入...</p>
                
                <div class="player-list-preview" id="playerListPreview">
                    <!-- 动态填充 -->
                </div>
                
                <p id="playerCount">0/12 玩家</p>
                <button class="btn btn-primary" id="startBtn" onclick="startGame()" disabled>等待房主开始</button>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div id="gameSection" class="hidden">
            <div class="game-info fade-in">
                <div class="day-counter" id="dayDisplay">第 1 天</div>
                <div class="phase" id="phaseDisplay">天亮了</div>
            </div>
            
            <div class="message-box fade-in">
                <div>
                    <div class="main-msg" id="mainMsg">等待中...</div>
                    <div class="sub-msg" id="subMsg"></div>
                </div>
            </div>
            
            <!-- 角色面板 (仅在游戏开始时显示一次) -->
            <div id="rolePanel" class="role-panel hidden">
                <h3>你的身份</h3>
                <div class="role-name" id="myRoleName">村民</div>
                <div class="role-desc" id="myRoleDesc"></div>
                <div class="skills" id="mySkills"></div>
            </div>
            
            <h3 style="margin-bottom: 10px; color: rgba(255,255,255,0.8);">👥 玩家</h3>
            <div class="players-grid" id="playersGrid">
                <!-- 动态填充 -->
            </div>
            
            <!-- 操作区 -->
            <div id="actionArea" class="action-area hidden">
                <h3 id="actionTitle">执行操作</h3>
                <div class="targets-grid" id="targetsGrid">
                    <!-- 动态填充 -->
                </div>
                <div class="action-tip" id="actionTip">请选择目标</div>
            </div>
        </div>
        
        <!-- 结果界面 -->
        <div id="resultSection" class="hidden">
            <div class="result-panel fade-in">
                <div class="winner" id="winnerText">好人胜利!</div>
                <div class="role-reveal" id="roleReveal">
                    <!-- 动态填充 -->
                </div>
                <button class="btn btn-primary" onclick="location.reload()">再来一局</button>
            </div>
        </div>
    </div>
    
    <script>
        // 游戏配置
        const WS_URL = `ws://${location.hostname}:3000`;
        let ws = null;
        let gameId = null;
        let playerIdx = 0;
        let myRole = null;
        let sfxEnabled = true;
        let roleShown = false; // 角色面板只展示一次
        
        // 角色定义
        const ROLES = {
            '狼人': { icon: '🐺', team: 'wolf', desc: '每晚可以击杀一名玩家', skills: ['击杀: 选择一名玩家击杀'] },
            '村民': { icon: '👨‍🌾', team: 'good', desc: '没有任何特殊能力，白天可以投票', skills: ['投票: 投出你怀疑的人'] },
            '预言家': { icon: '🔮', team: 'good', desc: '每晚可以查验一名玩家的身份', skills: ['查验: 查看目标的身份'] },
            '女巫': { icon: '🧪', team: 'good', desc: '有一瓶解药和一瓶毒药', skills: ['解药: 救人', '毒药: 杀人'] },
            '猎人': { icon: '🏹', team: 'good', desc: '出局时可以带走一人', skills: ['开枪: 出局时带走一人'] },
            '守卫': { icon: '🛡️', team: 'good', desc: '每晚可以守护一名玩家', skills: ['守护: 保护目标'] },
            '白痴': { icon: '🤪', team: 'good', desc: '被票死不死，但失去投票权', skills: ['免疫票死', '失去投票权'] }
        };
        
        // 连接 WebSocket
        function connect() {
            const statusEl = document.getElementById('connStatus');
            statusEl.textContent = '正在连接服务器...';
            statusEl.className = 'status-bar disconnected';
            
            try {
                ws = new WebSocket(WS_URL);
                ws.onopen = () => {
                    statusEl.textContent = '已连接';
                    statusEl.className = 'status-bar connected';
                };
                ws.onclose = () => {
                    statusEl.textContent = '连接断开';
                    statusEl.className = 'status-bar disconnected';
                };
                ws.onerror = () => {
                    statusEl.textContent = '连接失败';
                    statusEl.className = 'status-bar disconnected';
                };
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    handleMessage(msg);
                };
            } catch (e) {
                statusEl.textContent = '连接失败';
                statusEl.className = 'status-bar disconnected';
            }
        }
        
        // 处理消息
        function handleMessage(msg) {
            switch (msg.type) {
                case 'game_created':
                    gameId = msg.gameId;
                    // BUG FIX #9: 服务器现在也返回 playerIdx，确保房主 idx=0
                    playerIdx = msg.playerIdx !== undefined ? msg.playerIdx : 0;
                    document.getElementById('displayRoomCode').textContent = msg.gameId.toUpperCase();
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('waitingSection').classList.remove('hidden');
                    break;
                    
                case 'joined':
                    gameId = msg.gameId;
                    playerIdx = msg.playerIdx;
                    document.getElementById('displayRoomCode').textContent = msg.gameId.toUpperCase();
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('waitingSection').classList.remove('hidden');
                    break;
                    
                case 'game_state':
                    updateGameState(msg);
                    break;
                    
                case 'seer_result':
                    showSeerResult(msg);
                    break;
                    
                case 'error':
                    alert(msg.message);
                    break;
            }
        }
        
        // 更新游戏状态
        function updateGameState(state) {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            
            state.players.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'player-card fade-in';
                if (!p.alive) card.classList.add('dead');
                if (i === playerIdx) card.classList.add('self');
                
                // 只显示自己的角色图标（服务器已过滤）
                const roleInfo = p.role ? (ROLES[p.role] || { icon: '❓' }) : { icon: '🤔' };
                
                card.innerHTML = `
                    <div class="avatar">${roleInfo.icon}</div>
                    <div class="name">${p.name}${p.isHost ? ' 👑' : ''}</div>
                    <div class="role">${p.alive ? (p.role || '???') : '出局'}</div>
                `;
                
                card.onclick = () => handlePlayerClick(i, p);
                grid.appendChild(card);
            });
            
            document.getElementById('dayDisplay').textContent = '第 ' + state.day + ' 天';
            document.getElementById('phaseDisplay').textContent = getPhaseName(state.phase);
            document.getElementById('mainMsg').textContent = state.message;
            document.getElementById('subMsg').textContent = state.currentAction ? getActionHint(state.currentAction) : '';
            
            // 等待区域
            if (state.phase === 'waiting') {
                const preview = document.getElementById('playerListPreview');
                preview.innerHTML = '';
                state.players.forEach((p, i) => {
                    preview.innerHTML += `
                        <div class="player-preview">
                            <span class="num">${i + 1}</span>
                            <span>${p.name}</span>
                        </div>
                    `;
                });
                document.getElementById('playerCount').textContent = state.players.length + '/12 玩家';
                
                const startBtn = document.getElementById('startBtn');
                // BUG FIX #9: 用 playerIdx===0 判断是否为房主，不再对比 ws 对象
                const isHost = state.players[playerIdx] && state.players[playerIdx].isHost;
                if (isHost) {
                    startBtn.disabled = state.players.length < 6;
                    startBtn.textContent = state.players.length < 6 ? `还需${6 - state.players.length}人` : '开始游戏';
                } else {
                    startBtn.disabled = true;
                    startBtn.textContent = '等待房主开始';
                }
            }
            
            // 游戏开始时显示自己的角色面板（只显示一次）
            if (state.phase !== 'waiting' && state.phase !== 'ending') {
                const me = state.players[playerIdx];
                if (me && me.role && !roleShown) {
                    roleShown = true;
                    myRole = me.role;
                    showRolePanel(me.role);
                    document.getElementById('waitingSection').classList.add('hidden');
                    document.getElementById('gameSection').classList.remove('hidden');
                }
            }
            
            if (state.currentAction) {
                showActionUI(state.currentAction, state);
            } else {
                document.getElementById('actionArea').classList.add('hidden');
            }
            
            if (state.phase === 'ending') {
                showResult(state);
            }
        }
        
        function showRolePanel(role) {
            const roleInfo = ROLES[role] || { icon: '❓', desc: '', skills: [] };
            document.getElementById('myRoleName').textContent = roleInfo.icon + ' ' + role;
            document.getElementById('myRoleDesc').textContent = roleInfo.desc;
            document.getElementById('mySkills').innerHTML = roleInfo.skills.map(s =>
                `<div class="skill"><span class="skill-icon">⚡</span><div><div class="skill-name">${s}</div></div></div>`
            ).join('');
            document.getElementById('rolePanel').classList.remove('hidden');
            // 3秒后自动收起
            setTimeout(() => document.getElementById('rolePanel').classList.add('hidden'), 5000);
        }
        
        function getPhaseName(phase) {
            const names = { 'waiting': '等待开始', 'night': '天黑了', 'voting': '投票阶段', 'day': '白天', 'ending': '游戏结束' };
            return names[phase] || phase;
        }
        
        function getActionHint(action) {
            const hints = {
                'wolf_kill': '狼人请睁眼，选择击杀目标',
                'witch_save': '女巫请睁眼，是否使用解药',
                'seer_check': '预言家请睁眼，选择查验目标',
                'guard_protect': '守卫请睁眼，选择守护目标',
                'vote': '请投票选择要处决的玩家'
            };
            return hints[action] || '';
        }
        
        // 显示操作 UI
        function showActionUI(action, state) {
            const area = document.getElementById('actionArea');
            const title = document.getElementById('actionTitle');
            const grid = document.getElementById('targetsGrid');
            const tip = document.getElementById('actionTip');
            
            area.classList.remove('hidden');
            grid.innerHTML = '';
            
            const me = state.players[playerIdx];
            if (!me || !me.alive) {
                title.textContent = '你已出局';
                tip.textContent = '等待其他玩家行动';
                return;
            }
            
            // BUG FIX #10: 用 p.id !== playerIdx 替代 p.ws !== me
            const alivePlayers = state.players.filter(p => p.alive);
            
            if (action === 'wolf_kill' && me.role === '狼人') {
                title.textContent = '🐺 选择击杀目标';
                tip.textContent = '选择一名玩家击杀';
                alivePlayers.forEach(p => {
                    if (p.id !== playerIdx) { // 不能选自己
                        grid.innerHTML += `
                            <button class="target-btn" onclick="sendAction('wolf_kill', ${p.id})">
                                ${p.name}
                            </button>`;
                    }
                });
            } else if (action === 'seer_check' && me.role === '预言家') {
                title.textContent = '🔮 选择查验目标';
                tip.textContent = '查验一名玩家的身份';
                alivePlayers.forEach(p => {
                    if (p.id !== playerIdx) {
                        grid.innerHTML += `
                            <button class="target-btn" onclick="sendAction('seer_check', ${p.id})">
                                ${p.name}
                            </button>`;
                    }
                });
            } else if (action === 'guard_protect' && me.role === '守卫') {
                title.textContent = '🛡️ 选择守护目标';
                tip.textContent = '守护一名玩家（可以守护自己）';
                alivePlayers.forEach(p => {
                    grid.innerHTML += `
                        <button class="target-btn" onclick="sendAction('guard_protect', ${p.id})">
                            ${p.name}
                        </button>`;
                });
            } else if (action === 'vote') {
                title.textContent = '🗳️ 投票';
                tip.textContent = '选择要处决的玩家';
                alivePlayers.forEach(p => {
                    if (p.id !== playerIdx) {
                        grid.innerHTML += `
                            <button class="target-btn" onclick="sendVote(${p.id})">
                                ${p.name}
                            </button>`;
                    }
                });
            } else if (action === 'witch_save' && me.role === '女巫') {
                title.textContent = '🧪 女巫选择';
                // BUG FIX #8: 服务器现在传 nightKillName 供女巫 UI 使用
                tip.textContent = state.nightKillName
                    ? '昨晚狼人击杀了 ' + state.nightKillName + '，是否使用解药？'
                    : '是否使用解药？';
                // BUG FIX #4: 发送 true/false，server 端已修正对应逻辑
                grid.innerHTML = `
                    <button class="target-btn" onclick="sendAction('witch_save', true)">🧪 使用解药</button>
                    <button class="target-btn" onclick="sendAction('witch_save', false)">⏭️ 跳过</button>
                `;
            } else {
                title.textContent = '等待中...';
                tip.textContent = '请等待其他玩家行动';
            }
        }
        
        function handlePlayerClick(idx, player) {
            // 可扩展：点击查看玩家信息
        }
        
        function sendAction(action, target) {
            ws.send(JSON.stringify({ type: 'night_action', action, target }));
            document.getElementById('actionArea').classList.add('hidden');
        }
        
        function sendVote(target) {
            ws.send(JSON.stringify({ type: 'vote', target }));
            document.getElementById('actionArea').classList.add('hidden');
        }
        
        function showSeerResult(result) {
            const msg = `${result.target} 是${result.isWolf ? '🐺 狼人' : '✅ 好人'}`;
            document.getElementById('mainMsg').textContent = msg;
            document.getElementById('subMsg').textContent = '仅你自己可见';
        }
        
        function showResult(state) {
            document.getElementById('gameSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            const winnerText = document.getElementById('winnerText');
            if (state.winner === 'good') {
                winnerText.textContent = '🏆 好人胜利！';
                winnerText.style.color = '#4ade80';
            } else {
                winnerText.textContent = '🐺 狼人胜利！';
                winnerText.style.color = '#f87171';
            }
            
            const reveal = document.getElementById('roleReveal');
            reveal.innerHTML = '';
            state.players.forEach(p => {
                reveal.innerHTML += `
                    <div class="role-reveal-item">
                        <div class="name">${p.name}</div>
                        <div class="role">${p.role || '???'}</div>
                    </div>
                `;
            });
        }
        
        function createRoom() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert('请输入名字'); return; }
            ws.send(JSON.stringify({ type: 'create_game', name }));
        }
        
        function joinRoom() {
            const name = document.getElementById('playerName').value.trim();
            const code = document.getElementById('roomCode').value.trim().toLowerCase();
            if (!name) { alert('请输入名字'); return; }
            if (!code) { alert('请输入房间号'); return; }
            ws.send(JSON.stringify({ type: 'join_game', gameId: code, name }));
        }
        
        function startGame() {
            ws.send(JSON.stringify({ type: 'start_game' }));
        }
        
        function playSfx(type) { /* 可接 Web Audio API */ }
        
        function toggleSfx() {
            sfxEnabled = !sfxEnabled;
            document.getElementById('sfxBtn').textContent = sfxEnabled ? '🔊' : '🔇';
        }
        
        connect();
    </script>
</body>
</html>
