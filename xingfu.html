<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幸福一家人冒险记</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
  }

  #gameWrapper {
    position: relative;
    width: 800px;
    height: 600px;
  }

  canvas {
    display: block;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(120, 80, 255, 0.3), 0 0 120px rgba(80, 200, 255, 0.1);
  }

  /* UI固定在顶部，不挡游戏视野 */
  #ui {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px;
    pointer-events: none;
    z-index: 10;
    gap: 12px;
  }

  .score-panel {
    background: rgba(10, 10, 30, 0.85);
    border: 2px solid rgba(180, 120, 255, 0.6);
    border-radius: 12px;
    padding: 10px 20px;
    color: #e8d0ff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(180, 120, 255, 0.8);
    backdrop-filter: blur(4px);
  }

  .score-panel span {
    color: #7fffd4;
    font-size: 24px;
    text-shadow: 0 0 15px rgba(127, 255, 212, 0.8);
  }

  /* 血条容器 - 顶部中央 */
  #healthBarContainer {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    pointer-events: none;
    z-index: 10;
  }

  #healthBarLabel {
    text-align: center;
    color: #ff6b6b;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    text-shadow: 0 0 10px rgba(255, 107, 107, 0.8);
    letter-spacing: 2px;
  }

  #healthBarBg {
    width: 100%;
    height: 22px;
    background: rgba(20, 10, 40, 0.9);
    border: 2px solid rgba(255, 107, 107, 0.6);
    border-radius: 12px;
    overflow: hidden;
    padding: 2px;
    box-shadow: 0 0 15px rgba(255, 100, 150, 0.3), inset 0 0 10px rgba(0,0,0,0.5);
  }

  #healthBarSegments {
    display: flex;
    gap: 3px;
    height: 100%;
  }

  .hp-segment {
    flex: 1;
    height: 100%;
    border-radius: 4px;
    transition: background 0.3s, opacity 0.3s;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.2);
  }

  .hp-segment.dying {
    animation: hpDying 0.3s ease-out forwards;
  }

  @keyframes hpDying {
    0% { background: #ff0000 !important; box-shadow: 0 0 10px #ff0000; }
    100% { opacity: 0.3; background: #330000 !important; }
  }

  /* 计时器 - 右上角 */
  #timerDisplay {
    background: rgba(10, 10, 30, 0.85);
    border: 2px solid rgba(127, 255, 212, 0.4);
    border-radius: 8px;
    padding: 8px 14px;
    color: #7fffd4;
    font-size: 15px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(127, 255, 212, 0.6);
    pointer-events: none;
    z-index: 10;
  }

  /* 大头鬼CD指示器 - 左上角 */
  #tornadoCD {
    background: rgba(10, 10, 30, 0.85);
    border: 2px solid rgba(180, 100, 255, 0.5);
    border-radius: 8px;
    padding: 8px 14px;
    color: #e0b0ff;
    font-size: 13px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(180, 100, 255, 0.6);
    pointer-events: none;
    z-index: 10;
  }

  #tornadoCD.ready {
    border-color: rgba(180, 255, 100, 0.7);
    color: #b0ff80;
    text-shadow: 0 0 10px rgba(180, 255, 100, 0.8);
    animation: tornadoReady 0.5s ease-in-out infinite alternate;
  }

  @keyframes tornadoReady {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 20, 0.92);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 16px;
    z-index: 20;
    backdrop-filter: blur(8px);
  }

  #overlay.hidden { display: none; }

  #overlay h1 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 52px;
    color: #ff6bff;
    text-shadow: 0 0 30px rgba(255, 107, 255, 0.6), 0 4px 0 #7b2d8b;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  #overlay h2 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 26px;
    color: #7fffd4;
    text-shadow: 0 0 20px rgba(127, 255, 212, 0.6);
    margin-bottom: 28px;
  }

  .final-score {
    font-size: 20px;
    color: #e8d0ff;
    margin-bottom: 20px;
  }

  .final-score span {
    color: #ffd700;
    font-size: 32px;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
  }

  #startBtn, #restartBtn {
    padding: 14px 48px;
    font-size: 22px;
    font-family: 'ZCOOL KuaiLe', cursive;
    font-weight: 900;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 3px;
    pointer-events: all;
  }

  #startBtn {
    background: linear-gradient(135deg, #ff6bff, #9b4dff);
    color: white;
    box-shadow: 0 0 30px rgba(155, 77, 255, 0.6), 0 4px 0 #5a1a8a;
  }

  #startBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(155, 77, 255, 0.8), 0 6px 0 #5a1a8a;
  }

  #restartBtn {
    background: linear-gradient(135deg, #00e5ff, #0077ff);
    color: white;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.5), 0 4px 0 #0055aa;
    margin-top: 16px;
  }

  #restartBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(0, 229, 255, 0.8), 0 6px 0 #0055aa;
  }

  .hint {
    margin-top: 18px;
    color: rgba(200, 180, 255, 0.5);
    font-size: 14px;
  }

  .combo-display {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 34px;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 15;
  }

  .combo-display.show {
    opacity: 1;
    animation: comboPop 0.5s ease-out;
  }

  @keyframes comboPop {
    0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
    50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
  }

  .hit-flash {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: rgba(255, 215, 0, 0.15);
    pointer-events: none;
    opacity: 0;
    z-index: 5;
  }

  .hit-flash.active {
    animation: flashHit 0.3s ease-out;
  }

  @keyframes flashHit {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  .tornado-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(180,100,255,0.8) 0%, rgba(100,50,200,0.4) 50%, transparent 70%);
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
  }
  .tornado-flash.active {
    animation: tornadoFlash 0.4s ease-out forwards;
  }
  @keyframes tornadoFlash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  #spectatorHint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200, 180, 255, 0.4);
    font-size: 13px;
    pointer-events: none;
    z-index: 10;
    letter-spacing: 1px;
  }

  /* 晕眩提示 */
  #dizzyHint {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    pointer-events: none;
    opacity: 0;
    z-index: 15;
    transition: opacity 0.3s;
  }

  #dizzyHint.show {
    opacity: 1;
    animation: dizzyBounce 0.3s ease-out;
  }

  @keyframes dizzyBounce {
    0% { transform: translateX(-50%) scale(0.8); }
    50% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="game" width="800" height="600"></canvas>

  <!-- 顶部UI不挡视野 -->
  <div id="ui">
    <div id="tornadoCD" style="display:none">🌀 龙卷风 CD</div>
    <div id="timerDisplay" style="display:none">⏱ 0.0s</div>
  </div>

  <!-- 血条在顶部中央 -->
  <div id="healthBarContainer" style="display:none">
    <div id="healthBarLabel">🐶 小臭狗 HP</div>
    <div id="healthBarBg">
      <div id="healthBarSegments"></div>
    </div>
  </div>

  <div class="combo-display" id="comboPop">COMBO x3!</div>
  <div id="dizzyHint">😵 小臭狗晕眩中！</div>
  <div class="hit-flash" id="hitFlash"></div>
  <div class="tornado-flash" id="tornadoFlash"></div>
  <div id="spectatorHint">🐰 操控小白兔追捕小臭狗！方向键/WASD移动</div>

  <div id="overlay">
    <h1>幸福一家人</h1>
    <h2>～ 冒 险 记 ～</h2>
    <p id="gameHint" style="color:#ffd700;font-size:20px;margin-bottom:16px;text-shadow:0 0 15px rgba(255,215,0,0.7);display:none">🎮 操控小白兔追捕小臭狗！</p>
    <p class="final-score" id="finalScoreText" style="display:none">通关时间 <span id="highScoreDisplay">0</span></p>
    <button id="startBtn">开始游戏</button>
    <button id="restartBtn" style="display:none">再来一局</button>
    <p class="hint" id="menuHint">🎮 方向键/WASD控制小白兔，大头鬼是你的AI队友！</p>
  </div>
</div>

<script>
// === GAME CONFIG ===
const W = 800, H = 600;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// === GAME STATE ===
let state = 'menu';
let combo = 0;
let lastHitTime = 0;
let gameTime = 0;
let startTime = 0;
let elapsedTime = 0;
let particles = [];
let stars = [];
let dustParticles = [];

// === GHOST (大头鬼 - AI追击) ===
const ghost = {
  x: 200, y: 300,
  vx: 0, vy: 0,
  size: 40,
  headSize: 56,
  speed: 2.0,
  trail: [],
  floatOffset: 0,
  mouthAngle: 0,
  eyeBlink: 0,
  // AI
  aiTargetX: 0,
  aiTargetY: 0,
  aiUpdateInterval: 8,
  aiFrameCounter: 0,
  hitCooldown: 0,
  tauntText: '',
  tauntTimer: 0,
  // 大招：龙卷风旋转
  tornadoTimer: 0,
  tornadoCooldown: 0,
  tornadoDuration: 300,  // 5秒 @ 60fps
  tornadoCatchCooldown: 0,
  tornadoCD: 1800,      // 30秒 @ 60fps
};

// === RABBIT (小白兔 - 玩家控制) ===
const rabbit = {
  x: 600, y: 400,
  vx: 0, vy: 0,
  size: 30,
  speed: 3.0,
  trail: [],
  floatOffset: 0,
  hopPhase: 0,
  earWiggle: 0,
  tailWiggle: 0,
};

// === DOG (小臭狗 - 逃跑目标) ===
const dog = {
  x: 400, y: 300,
  vx: 0, vy: 0,
  speed: 3.5,
  maxSpeed: 5.5,
  size: 32,
  direction: -1,
  animFrame: 0,
  animTimer: 0,
  fearLevel: 0,
  runCycle: 0,
  hitCooldown: 0,
  hitImmuneTimer: 0,
  // 血量系统
  maxHealth: 100,
  health: 100,
  // 晕眩系统
  dizzyTimer: 0,
  dizzyImmuneTimer: 0,
  randomDirChangeTimer: 0,
  tauntTimer: 0,
  tauntText: '来追我呀~',
  // 逃跑冲刺锁定
  burstTimer: 0,
  burstDirX: 0,
  burstDirY: 0,
  burstDizzyChecked: false,
};

// === INPUT ===
const keys = { up: false, down: false, left: false, right: false };
document.addEventListener('keydown', e => {
  if (['ArrowUp','w','W'].includes(e.key)) { keys.up = true; e.preventDefault(); }
  if (['ArrowDown','s','S'].includes(e.key)) { keys.down = true; e.preventDefault(); }
  if (['ArrowLeft','a','A'].includes(e.key)) { keys.left = true; e.preventDefault(); }
  if (['ArrowRight','d','D'].includes(e.key)) { keys.right = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (['ArrowUp','w','W'].includes(e.key)) keys.up = false;
  if (['ArrowDown','s','S'].includes(e.key)) keys.down = false;
  if (['ArrowLeft','a','A'].includes(e.key)) keys.left = false;
  if (['ArrowRight','d','D'].includes(e.key)) keys.right = false;
});

// === INIT STARS ===
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 2 + 0.5,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.01,
    });
  }
}

// === PARTICLES ===
function spawnHitParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 5 + 1.5;
    const colors = ['#ffd700', '#ff6bff', '#7fffd4', '#ff6b6b', '#fff', '#ff9'];
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1,
      decay: Math.random() * 0.025 + 0.015,
      size: Math.random() * 7 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
    });
  }
}

function spawnRunDust(x, y, direction) {
  dustParticles.push({
    x, y,
    vx: -direction * (Math.random() * 1.2 + 0.3),
    vy: -Math.random() * 1.2,
    life: 1,
    decay: 0.035,
    size: Math.random() * 5 + 2,
  });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= p.decay;
    p.rotation += p.rotSpeed;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const d = dustParticles[i];
    d.x += d.vx;
    d.y += d.vy;
    d.life -= d.decay;
    if (d.life <= 0) dustParticles.splice(i, 1);
  }
}

// === COLLISION ===
function circleCollision(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return Math.sqrt(dx*dx + dy*dy) < ar + br;
}

// Check hunter touches dog's body
function checkHunterHit() {
  if (dog.hitCooldown > 0 || dog.dizzyTimer > 0) return null;

  // Check rabbit vs dog body
  if (circleCollision(rabbit.x, rabbit.y, rabbit.size, dog.x, dog.y, dog.size)) {
    return 'rabbit';
  }

  // Check ghost ruler vs dog body
  const ghostDir = dog.x > ghost.x ? 1 : -1;
  const rulerEndX = ghost.x + ghostDir * (ghost.size + 60);
  const rulerEndY = ghost.y;
  const distToRuler = Math.sqrt((dog.x - rulerEndX)**2 + (dog.y - rulerEndY)**2);
  if (distToRuler < 55 + dog.size) {
    return 'ghost';
  }

  return null;
}

// === GAME LOGIC ===
function resetGame() {
  combo = 0;
  gameTime = 0;
  startTime = Date.now();
  elapsedTime = 0;

  // Ghost
  ghost.x = 150;
  ghost.y = 300;
  ghost.vx = 0; ghost.vy = 0;
  ghost.tauntText = '';
  ghost.tauntTimer = 0;
  ghost.tornadoTimer = 0;
  ghost.tornadoCooldown = 0;
  ghost.tornadoCatchCooldown = 0;
  ghost.trail = [];
  ghost.aiFrameCounter = 0;
  ghost.aiTargetX = dog.x;
  ghost.aiTargetY = dog.y;

  // Rabbit
  rabbit.x = 650;
  rabbit.y = 300;
  rabbit.vx = 0; rabbit.vy = 0;
  rabbit.trail = [];
  rabbit.hopPhase = 0;

  // Dog
  dog.x = 400;
  dog.y = 150;
  dog.vx = 1.5; dog.vy = -1.0;
  dog.hitCooldown = 0;
  dog.fearLevel = 0;
  dog.tauntTimer = 60;
  dog.tauntText = '来追我呀~';
  dog.health = dog.maxHealth;
  dog.dizzyTimer = 0;
  dog.dizzyImmuneTimer = 0;
  dog.randomDirChangeTimer = 0;

  particles = [];
  dustParticles = [];

  // 显示UI
  document.getElementById('healthBarContainer').style.display = 'block';
  document.getElementById('timerDisplay').style.display = 'block';
  document.getElementById('tornadoCD').style.display = 'block';
  updateHealthBar();
  updateTimerDisplay();
  updateTornadoCD();
}

function updateUI() {
  // combo shown via canvas HUD, no DOM element needed
}

function updateHealthBar() {
  const pct = Math.max(0, dog.health / dog.maxHealth);
  const container = document.getElementById('healthBarSegments');
  if (!container) return;
  const SEGMENTS = 20;
  const filledCount = Math.ceil(pct * SEGMENTS);
  const prevCount = container._lastCount || filledCount;

  // 初始化或重建segments
  if (container.children.length !== SEGMENTS) {
    container.innerHTML = '';
    for (let i = 0; i < SEGMENTS; i++) {
      const seg = document.createElement('div');
      seg.className = 'hp-segment';
      container.appendChild(seg);
    }
  }

  const segs = container.children;
  for (let i = 0; i < SEGMENTS; i++) {
    const seg = segs[i];
    if (i < filledCount) {
      // 血量颜色：绿→黄→红
      const segPct = (i + 1) / SEGMENTS;
      let color;
      if (pct > 0.7) {
        color = `hsl(${120 + (1 - pct) * 30}, 100%, ${50 + (1 - pct) * 10}%)`;
      } else if (pct > 0.3) {
        color = `hsl(${60 - (0.7 - pct) * 150}, 100%, 55%)`;
      } else {
        color = `hsl(${0}, ${100}%, ${45 + (pct) * 15}%)`;
      }
      seg.style.background = color;
      seg.style.opacity = '1';
      seg.classList.remove('dying');
    } else if (i === prevCount && prevCount > filledCount) {
      // 刚掉血的那格：触发死亡动画
      seg.classList.add('dying');
    } else {
      seg.style.background = 'rgba(30, 10, 20, 0.8)';
      seg.style.opacity = '0.4';
      seg.classList.remove('dying');
    }
  }
  container._lastCount = filledCount;
}

function updateTimerDisplay() {
  const elapsed = (Date.now() - startTime) / 1000;
  elapsedTime = elapsed;
  document.getElementById('timerDisplay').textContent = `⏱ ${elapsed.toFixed(1)}s`;
}

function updateTornadoCD() {
  const el = document.getElementById('tornadoCD');
  if (ghost.tornadoTimer > 0) {
    el.textContent = '🌀 龙卷风进行中！';
    el.classList.remove('ready');
  } else if (ghost.tornadoCooldown > 0) {
    const cdSec = Math.ceil(ghost.tornadoCooldown / 60);
    el.textContent = `🌀 龙卷风 CD ${cdSec}s`;
    el.classList.remove('ready');
  } else {
    el.textContent = '🌀 龙卷风 就绪！';
    el.classList.add('ready');
  }
}

function showComboPop(text) {
  const el = document.getElementById('comboPop');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 800);
}

function showDizzyHint(show) {
  const el = document.getElementById('dizzyHint');
  if (show) {
    el.classList.add('show');
  } else {
    el.classList.remove('show');
  }
}

function flashHit() {
  const el = document.getElementById('hitFlash');
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

function flashTornadoStart() {
  const el = document.getElementById('tornadoFlash');
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

function handleHit(attacker) {
  const now = Date.now();
  if (now - lastHitTime < 1500) {
    combo++;
    if (combo >= 3) {
      showComboPop(`连击 x${combo}!`);
    }
  } else {
    combo = 1;
  }
  lastHitTime = now;

  // 大头鬼打中
  if (attacker === 'ghost') {
    ghost.hitCooldown = 20;
    const taunts = ['看我不抽你!', '给我站住!', '别跑!'];
    ghost.tauntText = taunts[Math.floor(Math.random() * taunts.length)];
  }

  // 伤害：普通攻击扣1格（5血），龙卷风扣2格（10血）
  const damage = attacker === 'ghost' ? 5 : 5;

  // 5秒内被打不硬直也不扣血
  if (dog.hitImmuneTimer > 0) {
    const texts = ['疼!', '别打了!', '我错了!'];
    dog.tauntText = texts[Math.floor(Math.random() * texts.length)];
    dog.tauntTimer = 40;
    spawnHitParticles(dog.x, dog.y, 5);
    flashHit();
    updateUI();
    return;
  }

  dog.health -= damage;
  updateHealthBar();

  dog.hitCooldown = 15;
  dog.fearLevel = Math.min(dog.fearLevel + 0.2, 1);

  // 被打后求饶
  const surrenderTexts = ['痛!', '妈妈我错了!', '我以后再也不敢了!', '饶命啊!', '别打了!'];
  dog.tauntText = surrenderTexts[Math.floor(Math.random() * surrenderTexts.length)];
  dog.tauntTimer = 80;

  // 被击中后短暂晕眩
  dog.dizzyTimer = Math.max(dog.dizzyTimer, 15);
  showDizzyHint(true);

  // 逃跑加速并锁定方向2秒
  const burstAngle = Math.atan2(dog.vy, dog.vx) + Math.PI + (Math.random() - 0.5) * 1.2;
  dog.vx = Math.cos(burstAngle) * (dog.speed * 3);
  dog.vy = Math.sin(burstAngle) * (dog.speed * 3);
  dog.burstTimer = 120;
  dog.burstDirX = -Math.cos(burstAngle);
  dog.burstDirY = -Math.sin(burstAngle);
  dog.burstDizzyChecked = false;

  dog.randomDirChangeTimer = 0;
  spawnHitParticles(dog.x, dog.y, 15);
  flashHit();
  updateUI();

  if (dog.health <= 0) {
    endGame();
  }
}

function endGame() {
  state = 'gameover';
  const finalTime = elapsedTime;

  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('overlay').querySelector('h1').textContent = '🎉 通关成功！';
  document.getElementById('overlay').querySelector('h2').textContent = '小臭狗被抓住了！';

  const finalScoreEl = document.getElementById('finalScoreText');
  finalScoreEl.style.display = 'block';
  finalScoreEl.innerHTML = `通关时间 <span>${finalTime.toFixed(1)}秒</span><br><small style="font-size:14px;color:#7fffd4">（时间越短越好！）</small>`;

  document.getElementById('gameHint').style.display = 'none';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('restartBtn').style.display = 'block';
  document.getElementById('menuHint').textContent = '按空格键或点击再来一局';

  document.getElementById('healthBarContainer').style.display = 'none';
  document.getElementById('timerDisplay').style.display = 'none';
  document.getElementById('tornadoCD').style.display = 'none';
  showDizzyHint(false);
}

// === AI: GHOST ===
function updateGhost() {
  ghost.aiFrameCounter++;

  // 检测攻击范围：用ghost的移动方向决定尺子方向
  const ghostMoveDir = ghost.vx > 0.5 ? 1 : (ghost.vx < -0.5 ? -1 : (dog.x > ghost.x ? 1 : -1));
  const rulerEndX = ghost.x + ghostMoveDir * (ghost.size + 60);
  const rulerEndY = ghost.y;
  const distToDog = Math.sqrt((dog.x - rulerEndX)**2 + (dog.y - rulerEndY)**2);
  if (distToDog < 60 && ghost.hitCooldown === 0 && ghost.tornadoTimer === 0) {
    ghost.hitCooldown = 25;
  }

  // 预测目标位置
  if (ghost.aiFrameCounter >= ghost.aiUpdateInterval) {
    ghost.aiFrameCounter = 0;
    const predictFrames = 10 + Math.random() * 5;
    ghost.aiTargetX = dog.x + dog.vx * predictFrames;
    ghost.aiTargetY = dog.y + dog.vy * predictFrames;
  }

  const dx = ghost.aiTargetX - ghost.x;
  const dy = ghost.aiTargetY - ghost.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist > 5) {
    const tx = dx / dist;
    const ty = dy / dist;
    ghost.vx = ghost.vx * 0.85 + tx * ghost.speed * 0.15;
    ghost.vy = ghost.vy * 0.85 + ty * ghost.speed * 0.15;

    const ghostVel = Math.sqrt(ghost.vx**2 + ghost.vy**2);
    if (ghostVel > ghost.speed * 1.2) {
      ghost.vx = (ghost.vx / ghostVel) * ghost.speed * 1.2;
      ghost.vy = (ghost.vy / ghostVel) * ghost.speed * 1.2;
    }
  } else {
    ghost.vx *= 0.9;
    ghost.vy *= 0.9;
  }

  ghost.x += ghost.vx;
  ghost.y += ghost.vy;

  // 边界
  if (ghost.x < ghost.size) { ghost.x = ghost.size; ghost.vx *= -0.5; }
  if (ghost.x > W - ghost.size) { ghost.x = W - ghost.size; ghost.vx *= -0.5; }
  if (ghost.y < ghost.size) { ghost.y = ghost.size; ghost.vy *= -0.5; }
  if (ghost.y > H - ghost.size) { ghost.y = H - ghost.size; ghost.vy *= -0.5; }

  // Trail
  ghost.trail.unshift({ x: ghost.x, y: ghost.y, alpha: 0.6 });
  if (ghost.trail.length > 10) ghost.trail.pop();
  ghost.trail.forEach(t => t.alpha *= 0.88);

  // Animation
  ghost.floatOffset += 0.06;
  ghost.mouthAngle += 0.1;
  ghost.eyeBlink = Math.random() < 0.004 ? 10 : Math.max(0, ghost.eyeBlink - 1);
  if (ghost.hitCooldown > 0) ghost.hitCooldown--;
  if (ghost.tauntTimer > 0) ghost.tauntTimer--;
  if (ghost.tornadoCooldown > 0) ghost.tornadoCooldown--;

  // 平时嘲讽：非战斗状态随机说话
  if (ghost.tauntTimer === 0 && ghost.tornadoTimer === 0 && ghost.hitCooldown === 0) {
    const idleTaunts = ['小珺珺~', '作业做好了吗？', '考试成绩出来了么？', '又在偷懒！', '别摸鱼了！', '过来让我打一下！', '哈哈！', '你能抓到我吗？', '太慢了~', '加油啊小笨蛋！'];
    ghost.tauntText = idleTaunts[Math.floor(Math.random() * idleTaunts.length)];
    ghost.tauntTimer = 300 + Math.floor(Math.random() * 300);
  }

  // 大招：龙卷风
  if (ghost.tornadoTimer > 0) {
    ghost.tornadoTimer--;
    const dx = dog.x - ghost.x;
    const dy = dog.y - ghost.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
      ghost.vx = ghost.vx * 0.7 + (dx/dist) * 8;
      ghost.vy = ghost.vy * 0.7 + (dy/dist) * 8;
    }
    // 速度上限
    const tornadoVel = Math.sqrt(ghost.vx**2 + ghost.vy**2);
    if (tornadoVel > 10) {
      ghost.vx = (ghost.vx / tornadoVel) * 10;
      ghost.vy = (ghost.vy / tornadoVel) * 10;
    }
    // 龙卷风抓到狗：扣2格（10血）
    if (dist < 60 && ghost.tornadoCatchCooldown === 0) {
      ghost.tornadoCatchCooldown = 20;
      dog.health = Math.max(0, dog.health - 10);
      updateHealthBar();
      spawnHitParticles(dog.x, dog.y, 10);
      flashHit();
      dog.fearLevel = Math.min(dog.fearLevel + 0.1, 1);
      const texts = ['疼!', '龙卷风!', '别打了!'];
      dog.tauntText = texts[Math.floor(Math.random() * texts.length)];
      dog.tauntTimer = 40;
      if (dog.health <= 0) endGame();
    }
    if (ghost.tornadoCatchCooldown > 0) ghost.tornadoCatchCooldown--;
    if (ghost.tornadoTimer === 0) {
      ghost.tornadoCooldown = ghost.tornadoCD;
      ghost.vx = 0; ghost.vy = 0; // 龙卷风结束停下来
    }
    updateTornadoCD();
    // 不 return，让后面的通用逻辑（trail、cooldown减1等）继续执行
  } else {
    // 开场3秒后才能放，且不在CD中
    if (ghost.tornadoCooldown === 0 && gameTime > 180) {
      const distToDog = Math.sqrt((dog.x - ghost.x)**2 + (dog.y - ghost.y)**2);
      if (distToDog < 500) {
        ghost.tornadoTimer = ghost.tornadoDuration;
        ghost.tauntText = '看我的龙卷风！';
        ghost.tauntTimer = 300 + Math.floor(Math.random() * 300);
        updateTornadoCD();
        flashTornadoStart();
      }
    }
    if (ghost.tornadoCooldown > 0) ghost.tornadoCooldown--;
    updateTornadoCD();
  }
}

// === PLAYER: RABBIT ===
function updateRabbit() {
  rabbit.hopPhase += 0.18;
  rabbit.earWiggle += 0.08;
  rabbit.tailWiggle += 0.12;

  let inputX = 0, inputY = 0;
  if (keys.up) inputY -= 1;
  if (keys.down) inputY += 1;
  if (keys.left) inputX -= 1;
  if (keys.right) inputX += 1;

  if (inputX !== 0 && inputY !== 0) {
    inputX *= 0.707;
    inputY *= 0.707;
  }

  rabbit.vx = rabbit.vx * 0.85 + inputX * rabbit.speed * 0.35;
  rabbit.vy = rabbit.vy * 0.85 + inputY * rabbit.speed * 0.35;
  rabbit.vy += 0.05;
  rabbit.vx += Math.sin(gameTime * 0.06) * 0.04;

  rabbit.x += rabbit.vx;
  rabbit.y += rabbit.vy;

  if (rabbit.x < rabbit.size) { rabbit.x = rabbit.size; rabbit.vx *= -0.5; }
  if (rabbit.x > W - rabbit.size) { rabbit.x = W - rabbit.size; rabbit.vx *= -0.5; }
  if (rabbit.y < rabbit.size) { rabbit.y = rabbit.size; rabbit.vy *= -0.5; }
  if (rabbit.y > H - rabbit.size) { rabbit.y = H - rabbit.size; rabbit.vy *= -0.5; }

  rabbit.trail.unshift({ x: rabbit.x, y: rabbit.y, alpha: 0.5 });
  if (rabbit.trail.length > 8) rabbit.trail.pop();
  rabbit.trail.forEach(t => t.alpha *= 0.88);
}

// === AI: DOG ===
function updateDog() {
  if (dog.hitCooldown > 0) dog.hitCooldown--;
  if (dog.dizzyImmuneTimer > 0) dog.dizzyImmuneTimer--;
  if (dog.hitImmuneTimer > 0) dog.hitImmuneTimer--;

  // 加速3秒后30%概率晕眩（每个burst只检查一次）
  if (dog.burstTimer > 0 && !dog.burstDizzyChecked && dog.burstTimer <= 60) {
    dog.burstDizzyChecked = true;
    if (Math.random() < 0.3) {
      dog.dizzyTimer = 120;
      dog.tauntText = '我头晕了...';
      dog.tauntTimer = 120;
      showDizzyHint(true);
    }
  }

  if (dog.dizzyTimer > 0) {
    dog.dizzyTimer--;
    if (dog.dizzyTimer === 0) {
      dog.dizzyImmuneTimer = 1200; // 20秒免疫
      dog.hitImmuneTimer = 300; // 被打后5秒不会再次硬直
      showDizzyHint(false);
    }
    dog.vx = 0;
    dog.vy = 0;
    dog.runCycle += 0.3;
    dog.x += dog.vx;
    dog.y += dog.vy;
    return;
  }

  // 冲刺锁定：被打后锁定方向2秒不修正
  if (dog.burstTimer > 0) {
    dog.burstTimer--;
    dog.vx = dog.vx * 0.9 + dog.burstDirX * dog.maxSpeed * 0.8;
    dog.vy = dog.vy * 0.9 + dog.burstDirY * dog.maxSpeed * 0.8;
    const vel = Math.sqrt(dog.vx**2 + dog.vy**2);
    if (vel > dog.maxSpeed) { dog.vx = (dog.vx/vel) * dog.maxSpeed; dog.vy = (dog.vy/vel) * dog.maxSpeed; }
    dog.x += dog.vx;
    dog.y += dog.vy;
    if (dog.x < dog.size * 2) { dog.x = dog.size * 2; dog.vx = Math.abs(dog.vx) * 0.8; }
    if (dog.x > W - dog.size * 2) { dog.x = W - dog.size * 2; dog.vx = -Math.abs(dog.vx) * 0.8; }
    if (dog.y < dog.size) { dog.y = dog.size; dog.vy = Math.abs(dog.vy) * 0.8; }
    if (dog.y > H - dog.size) { dog.y = H - dog.size; dog.vy = -Math.abs(dog.vy) * 0.8; }
    if (Math.abs(dog.vx) > 0.3) { dog.direction = dog.vx > 0 ? 1 : -1; }
    dog.runCycle += Math.sqrt(dog.vx**2 + dog.vy**2) * 0.12;
    return;
  }

  // 逃跑AI：远离猎手
  const dxGhost = dog.x - ghost.x;
  const dyGhost = dog.y - ghost.y;
  const distGhost = Math.sqrt(dxGhost*dxGhost + dyGhost*dyGhost);

  const dxRabbit = dog.x - rabbit.x;
  const dyRabbit = dog.y - rabbit.y;
  const distRabbit = Math.sqrt(dxRabbit*dxRabbit + dyRabbit*dyRabbit);

  // 离得越近权重越高，但主要听鬼的
  const ghostWeight = 3 / (distGhost + 1);
  const rabbitWeight = 0.5 / (distRabbit + 1);
  const totalWeight = ghostWeight + rabbitWeight;

  let escapeX = (dxGhost / distGhost * ghostWeight + dxRabbit / distRabbit * rabbitWeight) / totalWeight;
  let escapeY = (dyGhost / distGhost * ghostWeight + dyRabbit / distRabbit * rabbitWeight) / totalWeight;

  const escapeDist = Math.sqrt(escapeX*escapeX + escapeY*escapeY);
  if (escapeDist > 0) {
    escapeX /= escapeDist;
    escapeY /= escapeDist;
  }

  // 墙壁处理
  let wallBoostX = 0, wallBoostY = 0;
  if (dog.x < dog.size * 3) wallBoostX = 2;
  if (dog.x > W - dog.size * 3) wallBoostX = -2;
  if (dog.y < dog.size * 3) wallBoostY = 3;
  if (dog.y > H - dog.size * 2) wallBoostY = -2;

  // 恐惧加速
  const fearSpeed = dog.speed + dog.fearLevel * 2.5 + (dog.hitCooldown > 30 ? 2.5 : 0);
  const currentSpeed = Math.min(fearSpeed, dog.maxSpeed);
  const targetAngle = Math.atan2(escapeY, escapeX);

  dog.vx = dog.vx * 0.85 + Math.cos(targetAngle) * currentSpeed * 0.8 + wallBoostX;
  dog.vy = dog.vy * 0.85 + Math.sin(targetAngle) * currentSpeed * 0.8 + wallBoostY;

  const currentVel = Math.sqrt(dog.vx**2 + dog.vy**2);
  if (currentVel > dog.maxSpeed) {
    dog.vx = (dog.vx / currentVel) * dog.maxSpeed;
    dog.vy = (dog.vy / currentVel) * dog.maxSpeed;
  }

  dog.x += dog.vx;
  dog.y += dog.vy;

  // 边界
  if (dog.x < dog.size * 2) { dog.x = dog.size * 2; dog.vx = Math.abs(dog.vx) * 0.8; }
  if (dog.x > W - dog.size * 2) { dog.x = W - dog.size * 2; dog.vx = -Math.abs(dog.vx) * 0.8; }
  if (dog.y < dog.size) { dog.y = dog.size; dog.vy = Math.abs(dog.vy) * 0.8; }
  if (dog.y > H - dog.size) { dog.y = H - dog.size; dog.vy = -Math.abs(dog.vy) * 0.8; }

  // 方向
  if (Math.abs(dog.vx) > 0.3) {
    dog.direction = dog.vx > 0 ? 1 : -1;
  }

  dog.runCycle += Math.sqrt(dog.vx**2 + dog.vy**2) * 0.12;

  // 逃跑时嘲讽
  dog.tauntTimer--;
  if (dog.tauntTimer <= 0) {
    const taunts = ['来追我呀~', '追不到吧！', '哈哈！', '太慢啦~', '你有我快吗？'];
    dog.tauntText = taunts[Math.floor(Math.random() * taunts.length)];
    dog.tauntTimer = 120 + Math.floor(Math.random() * 120);
  }

  // Dust
  if (Math.sqrt(dog.vx**2 + dog.vy**2) > 2 && Math.random() < 0.25) {
    spawnRunDust(dog.x + dog.direction * dog.size, dog.y + dog.size * 0.8, dog.direction);
  }

  dog.fearLevel = Math.max(0, dog.fearLevel - 0.006);
}

// === DRAWING ===
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050515');
  grad.addColorStop(0.5, '#0d0d2b');
  grad.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    s.twinkle += s.speed;
    const alpha = 0.3 + Math.sin(s.twinkle) * 0.4 + 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 210, 255, ${alpha})`;
    ctx.fill();
  });

  const groundGrad = ctx.createLinearGradient(0, H - 60, 0, H);
  groundGrad.addColorStop(0, 'rgba(100, 60, 180, 0)');
  groundGrad.addColorStop(1, 'rgba(80, 40, 160, 0.15)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 60, W, 60);
}

function drawGhost(x, y) {
  const floatY = y + Math.sin(ghost.floatOffset) * 4;
  const headR = ghost.headSize;
  const bodyR = ghost.size;
  const dir = dog.x > x ? 1 : -1;

  ctx.save();
  ctx.translate(x, floatY);
  if (ghost.tornadoTimer > 0) {
    ctx.rotate(gameTime * 0.5);
  }

  // Trail
  ghost.trail.forEach((t, i) => {
    if (t.alpha < 0.05) return;
    const trailY = t.y - y;
    ctx.beginPath();
    ctx.arc(t.x - x, trailY, bodyR * (1 - i / ghost.trail.length) * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180, 100, 255, ${t.alpha * 0.25})`;
    ctx.fill();
  });

  // Body
  ctx.beginPath();
  ctx.arc(0, 0, bodyR, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200, 160, 255, 0.7)';
  ctx.shadowColor = 'rgba(180, 120, 255, 0.8)';
  ctx.shadowBlur = 25;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ghost wisps
  const wispCount = 4;
  for (let i = 0; i < wispCount; i++) {
    const wx = (i - (wispCount - 1) / 2) * (bodyR * 0.6);
    const wispPhase = ghost.floatOffset + i * 0.8;
    const wy = bodyR + Math.sin(wispPhase) * 5 + 4;
    ctx.beginPath();
    ctx.ellipse(wx, wy, 9, 12 + Math.sin(wispPhase) * 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 160, 255, 0.45)';
    ctx.fill();
  }

  // Head
  ctx.beginPath();
  ctx.arc(0, -bodyR * 0.4, headR, 0, Math.PI * 2);
  const headGrad = ctx.createRadialGradient(-headR * 0.2, -bodyR * 0.5, 0, 0, -bodyR * 0.4, headR);
  headGrad.addColorStop(0, '#fff0ff');
  headGrad.addColorStop(0.6, '#e0b0ff');
  headGrad.addColorStop(1, '#c090ee');
  ctx.fillStyle = headGrad;
  ctx.shadowColor = 'rgba(200, 150, 255, 0.9)';
  ctx.shadowBlur = 35;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes
  const eyeLookX = dir * 4;
  const eyeY = -bodyR * 0.5;
  const eyeH = ghost.eyeBlink > 0 ? 2 : 11;
  const eyeW = 7;

  ctx.beginPath();
  ctx.ellipse(-12, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0030';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-12 + eyeLookX * 0.3, eyeY, 3.5, eyeH * 0.65, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(12, eyeY, eyeW, eyeH, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0030';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(12 + eyeLookX * 0.3, eyeY, 3.5, eyeH * 0.65, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Mouth
  const mouthOpen = 7 + Math.sin(ghost.mouthAngle) * 2.5;
  ctx.beginPath();
  ctx.ellipse(0, -bodyR * 0.25 + headR * 0.55, 16, mouthOpen, 0, 0, Math.PI);
  ctx.fillStyle = '#7b0055';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -bodyR * 0.25 + headR * 0.55, 10, mouthOpen * 0.55, 0, 0, Math.PI);
  ctx.fillStyle = '#ff80bf';
  ctx.fill();

  // 尺子手臂：放在身体旋转块内，龙卷风时整体跟着转
  const hitSwing = ghost.hitCooldown > 0 ? Math.sin(ghost.hitCooldown * 0.4) * 0.9 : 0;
  const normalSwing = Math.sin(ghost.mouthAngle * 0.2) * 0.08;
  const totalSwing = hitSwing + normalSwing;
  const moveDir = ghost.vx > 0.5 ? 1 : (ghost.vx < -0.5 ? -1 : dir);
  const armX = moveDir * bodyR * 1.0;
  const armY = bodyR * 0.1;

  ctx.save();
  ctx.translate(armX, armY);
  ctx.rotate(totalSwing);

  ctx.beginPath();
  ctx.ellipse(moveDir * 15, 0, 7, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#d0a0f0';
  ctx.fill();

  const rulerLen = ghost.tornadoTimer > 0 ? 80 : 55;
  const rulerW = 6;
  ctx.save();
  ctx.translate(moveDir * 20, 0);
  ctx.rotate(moveDir > 0 ? 0 : Math.PI);
  ctx.fillStyle = '#DEB887';
  ctx.beginPath();
  ctx.roundRect(0, -rulerW/2, rulerLen, rulerW, 2);
  ctx.fill();
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 11; i++) {
    const px = 4 + i * 4.5;
    const ph = i % 5 === 0 ? 3 : 1.5;
    ctx.beginPath();
    ctx.moveTo(px, -rulerW/2);
    ctx.lineTo(px, -rulerW/2 + ph);
    ctx.stroke();
  }
  ctx.restore();
  ctx.restore();

  ctx.restore();

  // 龙卷风特效
  if (ghost.tornadoTimer > 0) {
    ctx.save();
    ctx.translate(x, floatY);
    ctx.globalCompositeOperation = 'lighter';

    // 外发光背景
    const glowR = 80 + Math.sin(gameTime * 0.2) * 10;
    const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    glow.addColorStop(0, 'rgba(200, 100, 255, 0.4)');
    glow.addColorStop(0.5, 'rgba(150, 50, 255, 0.2)');
    glow.addColorStop(1, 'rgba(100, 0, 255, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, glowR, 0, Math.PI * 2);
    ctx.fill();

    // 多层旋转环
    for (let layer = 0; layer < 5; layer++) {
      const layerSpeed = 0.15 + layer * 0.08;
      const ringAngle = gameTime * layerSpeed + (layer / 5) * Math.PI * 2;
      const ringR = 25 + layer * 18;
      const alpha = 0.9 - layer * 0.15;

      ctx.beginPath();
      for (let i = 0; i < 36; i++) {
        const a = ringAngle + (i / 36) * Math.PI * 2;
        const wobble = Math.sin(a * 3 + gameTime * 0.3) * 4;
        const px = Math.cos(a) * (ringR + wobble);
        const py = Math.sin(a) * (ringR + wobble);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.strokeStyle = 'rgba(180, 100, 255, ' + alpha + ')';
      ctx.lineWidth = 5 - layer * 0.5;
      ctx.stroke();
    }

    // 放射状光芒
    for (let i = 0; i < 12; i++) {
      const a = gameTime * 0.4 + (i / 12) * Math.PI * 2;
      const len = 60 + Math.sin(gameTime * 0.3 + i) * 15;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len);
      ctx.strokeStyle = 'rgba(255, 200, 255, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 飞溅粒子
    for (let i = 0; i < 20; i++) {
      const a = gameTime * 0.2 + (i / 20) * Math.PI * 2 + Math.sin(gameTime * 0.1 + i) * 0.5;
      const dist = 50 + Math.sin(gameTime * 0.15 + i * 0.7) * 30 + i * 3;
      const px = Math.cos(a) * dist;
      const py = Math.sin(a) * dist;
      const size = 3 + Math.sin(gameTime * 0.2 + i) * 1.5;
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 180, 255, 0.7)';
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawGhostTauntBubble() {
  if (!ghost.tauntText || ghost.tauntTimer <= 0) return;
  const bx = ghost.x;
  const by = ghost.y - ghost.size - 30;
  const text = ghost.tauntText;
  ctx.font = 'bold 13px "Noto Sans SC"';
  const tw = ctx.measureText(text).width;
  const bw = tw + 16;
  const bh = 22;
  const bx0 = bx - bw / 2;
  const by0 = by - bh / 2;

  ctx.fillStyle = 'rgba(220, 180, 255, 0.95)';
  ctx.beginPath();
  ctx.roundRect(bx0, by0, bw, bh, 6);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(bx - 4, by0 + bh);
  ctx.lineTo(bx + 4, by0 + bh);
  ctx.lineTo(bx, by0 + bh + 6);
  ctx.fill();

  ctx.fillStyle = '#4a0040';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, bx, by0 + bh / 2);
}

function drawRabbit(x, y) {
  const hopY = y + Math.abs(Math.sin(rabbit.hopPhase)) * -12;
  const dir = dog.x > x ? 1 : -1;
  const size = rabbit.size;

  ctx.save();
  ctx.translate(x, hopY);

  rabbit.trail.forEach((t, i) => {
    if (t.alpha < 0.04) return;
    const trailY = t.y - y;
    ctx.beginPath();
    ctx.arc(t.x - x, trailY, size * (1 - i / rabbit.trail.length) * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${t.alpha * 0.2})`;
    ctx.fill();
  });

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 5, size, size * 0.85, 0, 0, Math.PI * 2);
  const bodyGrad = ctx.createRadialGradient(0, 2, 0, 0, 5, size * 1.2);
  bodyGrad.addColorStop(0, '#ffffff');
  bodyGrad.addColorStop(0.7, '#f5f5f5');
  bodyGrad.addColorStop(1, '#e8e8e8');
  ctx.fillStyle = bodyGrad;
  ctx.shadowColor = 'rgba(255, 255, 255, 0.6)';
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ears
  const earWiggle = Math.sin(rabbit.earWiggle) * 0.1;

  ctx.save();
  ctx.translate(-9, -size * 0.6);
  ctx.rotate(-0.15 + earWiggle);
  ctx.beginPath();
  ctx.ellipse(0, -22, 7, 22, 0, 0, Math.PI * 2);
  const earGrad = ctx.createLinearGradient(0, -44, 0, 0);
  earGrad.addColorStop(0, '#ffffff');
  earGrad.addColorStop(0.5, '#f8f8f8');
  earGrad.addColorStop(1, '#e0e0e0');
  ctx.fillStyle = earGrad;
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -20, 3.5, 14, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 180, 200, 0.6)';
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(9, -size * 0.6);
  ctx.rotate(0.15 - earWiggle);
  ctx.beginPath();
  ctx.ellipse(0, -22, 7, 22, 0, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -20, 3.5, 14, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 180, 200, 0.6)';
  ctx.fill();
  ctx.restore();

  // Head
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.3, size * 0.75, size * 0.7, 0, 0, Math.PI * 2);
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Eyes
  const eyeY = -size * 0.35;
  ctx.beginPath();
  ctx.ellipse(-8 * dir, eyeY, 4, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0a2e';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8 * dir, eyeY, 4, 5, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0a2e';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-8 * dir + 1, eyeY - 1, 1.5, 0, Math.PI * 2);
  ctx.arc(8 * dir + 1, eyeY - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.15, 4, 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#ffaaaa';
  ctx.fill();

  // Mouth
  ctx.beginPath();
  ctx.moveTo(-4, -size * 0.05);
  ctx.lineTo(0, -size * 0.12);
  ctx.lineTo(4, -size * 0.05);
  ctx.strokeStyle = '#cc8888';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = 'rgba(200, 200, 200, 0.5)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const hy = -size * 0.15 + i * 5;
    ctx.beginPath();
    ctx.moveTo(0, hy);
    ctx.lineTo(-16, hy - 3 + i * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, hy);
    ctx.lineTo(16, hy - 3 + i * 2);
    ctx.stroke();
  }

  // Paws
  const pawOffset = Math.sin(rabbit.hopPhase * 0.5) * 3;
  ctx.beginPath();
  ctx.ellipse(-size * 0.5, size * 0.5 + pawOffset, 7, 5, -0.3, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f0f0f0';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(size * 0.5, size * 0.5 - pawOffset, 7, 5, 0.3, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#f0f0f0';
  ctx.fill();

  // Tail
  const tailWag = Math.sin(rabbit.tailWiggle) * 0.3;
  ctx.save();
  ctx.translate(-dir * (size + 2), size * 0.3);
  ctx.rotate(tailWag);
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 8;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.restore();
}

function drawDog(x, y) {
  const dir = dog.direction;
  const bodyBob = Math.sin(dog.runCycle) * 3;
  const legCycle = dog.runCycle;

  ctx.save();
  ctx.translate(x, y + bodyBob);

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, 20, 22, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
  ctx.fill();

  // Tail
  ctx.save();
  ctx.translate(-dir * 18, -8);
  const tailWag = Math.sin(legCycle * 2) * 0.5 + 0.3;
  ctx.rotate(-dir * (0.8 + tailWag));
  ctx.beginPath();
  ctx.ellipse(0, -10, 5, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#8B6914';
  ctx.fill();
  ctx.restore();

  // Back legs
  const legOffset1 = Math.sin(legCycle) * 8;
  const legOffset2 = Math.sin(legCycle + Math.PI) * 8;
  ctx.fillStyle = '#7a5c10';
  ctx.fillRect(-12, 5, 8, 18 + legOffset1 * 0.5);
  ctx.fillRect(-4, 5, 8, 18 + legOffset2 * 0.5);

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, 24, 16, 0, 0, Math.PI * 2);
  const bodyGrad = ctx.createRadialGradient(0, -5, 0, 0, 0, 28);
  bodyGrad.addColorStop(0, '#d4a030');
  bodyGrad.addColorStop(1, '#8B6914');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Fear glow
  if (dog.hitCooldown > 20) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const pulse = 0.3 + Math.sin(gameTime * 0.3) * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, 40, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 200, 50, ${pulse})`;
    ctx.fill();
    ctx.restore();

    const t = gameTime * 0.2;
    const ringR = 32 + Math.sin(t) * 4;
    ctx.beginPath();
    ctx.arc(0, 0, ringR, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255, 180, 50, ${0.6 + Math.sin(t) * 0.3})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // Front legs
  ctx.fillStyle = '#7a5c10';
  ctx.fillRect(8, 5, 8, 18 + legOffset2 * 0.5);
  ctx.fillRect(16, 5, 8, 18 + legOffset1 * 0.5);

  // Head
  ctx.save();
  ctx.translate(dir * 18, -12);
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 14, 0, 0, Math.PI * 2);
  const headGrad = ctx.createRadialGradient(0, -3, 0, 0, 0, 18);
  headGrad.addColorStop(0, '#e8b840');
  headGrad.addColorStop(1, '#9B7520');
  ctx.fillStyle = headGrad;
  ctx.fill();

  // Ears
  ctx.fillStyle = '#7a5c10';
  ctx.beginPath();
  ctx.ellipse(-8, -12, 6, 9, -0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -12, 6, 9, 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  const eyeScale = dog.fearLevel > 0.5 ? 1.4 : 1;
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath();
  ctx.ellipse(-5 * dir, -3, 4 * eyeScale, 5 * eyeScale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5 * dir, -3, 4 * eyeScale, 5 * eyeScale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-5 * dir + 1, -4, 1.5, 0, Math.PI * 2);
  ctx.arc(5 * dir + 1, -4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.beginPath();
  ctx.ellipse(dir * 14, 2, 4, 3, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#3a1a00';
  ctx.fill();

  // Mouth
  if (dog.fearLevel > 0.3) {
    ctx.beginPath();
    ctx.ellipse(dir * 10, 7, 5, 4 + dog.fearLevel * 3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#cc3333';
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(dir * 10, 6, 4, 0, Math.PI);
    ctx.strokeStyle = '#3a1a00';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.restore();

  // Butt
  const buttX = -dir * (24 + 10);
  const buttY = 0;

  ctx.beginPath();
  ctx.arc(buttX, buttY, 14, 0, Math.PI * 2);
  const buttGrad = ctx.createRadialGradient(buttX, buttY, 0, buttX, buttY, 14);
  buttGrad.addColorStop(0, '#ffd080');
  buttGrad.addColorStop(0.5, '#ffaa30');
  buttGrad.addColorStop(1, '#cc7700');
  ctx.fillStyle = buttGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(buttX, buttY, 14, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(180, 80, 0, 0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.restore();

  // 晕眩螺旋
  if (dog.dizzyTimer > 0) {
    const spiralCount = 3;
    for (let i = 0; i < spiralCount; i++) {
      const angle = gameTime * 0.15 + (i / spiralCount) * Math.PI * 2;
      const sx = dog.x + Math.cos(angle) * 12;
      const sy = dog.y - dog.size - 35 + Math.sin(angle * 2) * 4;
      ctx.beginPath();
      ctx.arc(sx, sy, 5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 200, 50, ${0.7 + Math.sin(gameTime * 0.1 + i) * 0.3})`;
      ctx.fill();
    }
  }
}

function drawTauntBubble() {
  if (!dog.tauntText || dog.tauntTimer <= 0) return;
  const bx = dog.x;
  const by = dog.y - dog.size - 25;
  const text = dog.tauntText;
  ctx.font = 'bold 13px "Noto Sans SC"';
  const tw = ctx.measureText(text).width;
  const bw = tw + 16;
  const bh = 22;
  const bx0 = bx - bw / 2;
  const by0 = by - bh / 2;

  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.roundRect(bx0, by0, bw, bh, 6);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(bx - 4, by0 + bh);
  ctx.lineTo(bx + 4, by0 + bh);
  ctx.lineTo(bx, by0 + bh + 6);
  ctx.fill();

  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, bx, by0 + bh / 2);
}

function drawParticles() {
  dustParticles.forEach(d => {
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size * d.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150, 120, 200, ${d.life * 0.35})`;
    ctx.fill();
  });

  particles.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = p.life;

    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
      const outerX = Math.cos(angle) * p.size;
      const outerY = Math.sin(angle) * p.size;
      const innerAngle = angle + Math.PI / 5;
      const innerX = Math.cos(innerAngle) * p.size * 0.4;
      const innerY = Math.sin(innerAngle) * p.size * 0.4;
      if (i === 0) ctx.moveTo(outerX, outerY);
      else ctx.lineTo(outerX, outerY);
      ctx.lineTo(innerX, innerY);
    }
    ctx.closePath();
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  });
}

function drawHUD() {
  // Combo
  if (combo > 0) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 16px "Noto Sans SC"';
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.fillText(`连击 x${combo}`, W / 2, H - 20);
    ctx.shadowBlur = 0;
  }

  // Legend
  ctx.textAlign = 'left';
  ctx.font = '12px "Noto Sans SC"';
  ctx.fillStyle = 'rgba(200, 160, 255, 0.7)';
  ctx.fillText('🟣 大头鬼 AI', 10, H - 12);
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.fillText('⚪ 小白兔 [你]', 105, H - 12);
}

// === MAIN LOOP ===
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if (state === 'playing') {
    gameTime++;
    updateGhost();
    updateRabbit();
    updateDog();
    updateParticles();
    updateTimerDisplay();

    const attacker = checkHunterHit();
    if (attacker) {
      handleHit(attacker);
    }
  }

  drawBackground();
  drawParticles();
  drawDog(dog.x, dog.y);
  drawTauntBubble();
  drawGhost(ghost.x, ghost.y);
  drawGhostTauntBubble();
  drawRabbit(rabbit.x, rabbit.y);

  if (state === 'playing') {
    drawHUD();
  }

  requestAnimationFrame(gameLoop);
}

// === UI EVENTS ===
document.getElementById('startBtn').addEventListener('click', () => {
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('spectatorHint').style.display = 'block';
  resetGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('finalScoreText').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = '幸福一家人';
  document.getElementById('overlay').querySelector('h2').textContent = '～ 冒 险 记 ～';
  resetGame();
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    if (state === 'menu') {
      document.getElementById('startBtn').click();
    } else if (state === 'gameover') {
      document.getElementById('restartBtn').click();
    }
  }
});

// === INIT ===
initStars();
requestAnimationFrame(gameLoop);
</script>
